<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="CONTENT_TITLE='All Complaints'">
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Manage Complaints</h2>
        
        <!-- Filter Form -->
        <form th:action="@{/admin/complaints}" method="get" class="d-flex w-25">
            <select name="status" class="form-select me-2" onchange="this.form.submit()">
                <option value="">All Statuses</option>
                <option value="PENDING" th:selected="${currentStatus != null and currentStatus.name() == 'PENDING'}">PENDING</option>
                <option value="IN_PROGRESS" th:selected="${currentStatus != null and currentStatus.name() == 'IN_PROGRESS'}">IN_PROGRESS</option>
                <option value="RESOLVED" th:selected="${currentStatus != null and currentStatus.name() == 'RESOLVED'}">RESOLVED</option>
                <option value="REJECTED" th:selected="${currentStatus != null and currentStatus.name() == 'REJECTED'}">REJECTED</option>
            </select>
        </form>
    </div>

    <div th:if="${param.assigned}" class="alert alert-success alert-dismissible fade show">
        Staff successfully assigned and status updated to IN PROGRESS.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <div th:if="${param.status_updated}" class="alert alert-info alert-dismissible fade show">
        Complaint status updated successfully. Citizen notified.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm border-0 table-custom">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Citizen</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th class="pe-4 text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="complaint : ${complaintPage.content}">
                            <td class="ps-4" th:text="${'#' + complaint.id}"></td>
                            <td class="fw-500" th:text="${complaint.title}"></td>
                            <td th:text="${complaint.category.name}"></td>
                            <td th:text="${complaint.user.name}"></td>
                            <td th:text="${#temporals.format(complaint.createdAt, 'dd/MM/yyyy')}"></td>
                            <td>
                                <span th:class="'badge badge-' + ${complaint.status}" th:text="${complaint.status}"></span>
                            </td>
                            <td class="pe-4 text-end">
                                <!-- Status Update Form Inline via Modal Trigger (Simple implementation uses an expand or direct button) -->
                                <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-toggle="modal" th:data-bs-target="'#statusModal' + ${complaint.id}">
                                    Update
                                </button>
                                
                                <a th:if="${complaint.assignment == null}" th:href="@{'/admin/complaints/' + ${complaint.id} + '/assign'}" class="btn btn-sm btn-accent ms-1">Assign</a>
                                <span th:if="${complaint.assignment != null}" class="badge bg-light text-dark border ms-1" th:text="${'Assigned: ' + complaint.assignment.staff.name}"></span>
                                
                                <!-- Status Update Modal -->
                                <div class="modal fade" th:id="'statusModal' + ${complaint.id}" tabindex="-1" aria-hidden="true">
                                  <div class="modal-dialog">
                                    <div class="modal-content text-start">
                                      <div class="modal-header">
                                        <h5 class="modal-title">Update Status: #[[${complaint.id}]]</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                      </div>
                                      <form th:action="@{'/admin/complaints/' + ${complaint.id} + '/status'}" method="post">
                                          <div class="modal-body">
                                            <p th:text="${complaint.title}"></p>
                                            <div class="mb-3">
                                                <label class="form-label">New Status</label>
                                                <select name="status" class="form-select">
                                                    <option value="PENDING" th:selected="${complaint.status.name() == 'PENDING'}">PENDING</option>
                                                    <option value="IN_PROGRESS" th:selected="${complaint.status.name() == 'IN_PROGRESS'}">IN_PROGRESS</option>
                                                    <option value="RESOLVED" th:selected="${complaint.status.name() == 'RESOLVED'}">RESOLVED</option>
                                                    <option value="REJECTED" th:selected="${complaint.status.name() == 'REJECTED'}">REJECTED</option>
                                                </select>
                                            </div>
                                          </div>
                                          <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                            <button type="submit" class="btn btn-primary">Save Changes</button>
                                          </div>
                                      </form>
                                    </div>
                                  </div>
                                </div>
                                <!-- End Modal -->
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(complaintPage.content)}">
                            <td colspan="7" class="text-center py-5 text-muted">No complaints found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Pagination -->
        <div class="card-footer bg-white py-3 border-0" th:if="${complaintPage.totalPages > 1}">
            <nav>
                <ul class="pagination mb-0 justify-content-end">
                    <li class="page-item" th:classappend="${complaintPage.first ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/admin/complaints(page=${complaintPage.number - 1}, status=${currentStatus})}">Previous</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, complaintPage.totalPages - 1)}"
                        th:classappend="${complaintPage.number == i ? 'active' : ''}">
                        <a class="page-link" th:href="@{/admin/complaints(page=${i}, status=${currentStatus})}" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${complaintPage.last ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/admin/complaints(page=${complaintPage.number + 1}, status=${currentStatus})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</body>
</html>
