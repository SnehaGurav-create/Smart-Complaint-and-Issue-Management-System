<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="CONTENT_TITLE='Admin Dashboard'">
<body>
<div layout:fragment="content">
    <div class="mb-4">
        <h2>Admin Dashboard</h2>
        <p class="text-muted">System Overview & Management</p>
    </div>

    <!-- Stats Row -->
    <div class="row mb-5">
        <div class="col-md-4 mb-3">
            <div class="card stat-card bg-primary text-white">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-uppercase mb-2">Total Tickets</h6>
                        <h2 class="mb-0" th:text="${totalCount}">0</h2>
                    </div>
                    <i class="fas fa-layer-group stat-icon text-white opacity-50"></i>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card stat-card border-warning border-start border-5 border-top-0 border-bottom-0 border-end-0">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-secondary text-uppercase mb-2">Needs Action</h6>
                        <h2 class="mb-0 text-dark" th:text="${pendingCount}">0</h2>
                    </div>
                    <i class="fas fa-exclamation-triangle stat-icon text-warning"></i>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card stat-card border-success border-start border-5 border-top-0 border-bottom-0 border-end-0">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-secondary text-uppercase mb-2">Resolved</h6>
                        <h2 class="mb-0 text-dark" th:text="${resolvedCount}">0</h2>
                    </div>
                    <i class="fas fa-check-double stat-icon text-success"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Actions & Recent -->
    <div class="row">
        <div class="col-12 mb-4">
            <div class="card shadow-sm border-0 table-custom">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Recent Complaints</h5>
                    <a th:href="@{/admin/complaints}" class="btn btn-sm btn-outline-primary">Manage All</a>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Title</th>
                                    <th>Category</th>
                                    <th>Citizen</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="complaint : ${recentComplaints}">
                                    <td th:text="${'#' + complaint.id}"></td>
                                    <td class="fw-500" th:text="${complaint.title}"></td>
                                    <td th:text="${complaint.category.name}"></td>
                                    <td th:text="${complaint.user.name}"></td>
                                    <td>
                                        <span th:class="'badge badge-' + ${complaint.status}" th:text="${complaint.status}"></span>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(recentComplaints)}">
                                    <td colspan="5" class="text-center py-4 text-muted">No complaints in system.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
