<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="CONTENT_TITLE='Assign Complaint'">
<body>
<div layout:fragment="content">
    
    <div class="mb-4 d-flex justify-content-between align-items-center">
        <div>
            <a th:href="@{/admin/complaints}" class="btn btn-sm btn-outline-secondary mb-3"><i class="fas fa-arrow-left"></i> Back</a>
            <h2>Assign Staff</h2>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-4">
            <div class="row mb-4 bg-light p-3 rounded">
                <div class="col-md-3">
                    <p class="text-muted mb-0 small">Complaint ID</p>
                    <h6 class="mb-0" th:text="${'#' + complaint.id}"></h6>
                </div>
                <div class="col-md-6">
                    <p class="text-muted mb-0 small">Title</p>
                    <h6 class="mb-0" th:text="${complaint.title}"></h6>
                </div>
                <div class="col-md-3">
                    <p class="text-muted mb-0 small">Category</p>
                    <h6 class="mb-0" th:text="${complaint.category.name}"></h6>
                </div>
            </div>
            
            <form th:action="@{'/admin/complaints/' + ${complaint.id} + '/assign'}" method="post">
                <div class="mb-4">
                    <label class="form-label fw-bold">Select Staff Member</label>
                    <select name="staffId" class="form-select w-50" required>
                        <option value="">-- Choose Field Staff --</option>
                        <option th:each="staff : ${staffList}" th:value="${staff.id}" th:text="${staff.name + ' (' + staff.email + ')'}"></option>
                    </select>
                </div>
                
                <div class="alert alert-warning mb-4" role="alert">
                    <i class="fas fa-info-circle me-2"></i> Assigning a staff member will automatically change the complaint status to <strong>IN_PROGRESS</strong>.
                </div>
                
                <button type="submit" class="btn btn-primary">Lock Assignment</button>
            </form>

        </div>
    </div>
</div>
</body>
</html>
