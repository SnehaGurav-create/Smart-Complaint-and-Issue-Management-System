<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="CONTENT_TITLE='User Dashboard'">
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Dashboard</h2>
        <a th:href="@{/user/complaints/new}" class="btn btn-accent"><i class="fas fa-plus"></i> New Complaint</a>
    </div>

    <!-- Stats Row -->
    <div class="row mb-5">
        <div class="col-md-4 mb-3">
            <div class="card stat-card bg-primary text-white">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-uppercase mb-2">Total Complaints</h6>
                        <h2 class="mb-0" th:text="${totalComplaints}">0</h2>
                    </div>
                    <i class="fas fa-clipboard-list stat-icon text-white opacity-50"></i>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card stat-card border-warning border-start border-5 border-top-0 border-bottom-0 border-end-0">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-secondary text-uppercase mb-2">Pending</h6>
                        <h2 class="mb-0 text-dark" th:text="${pendingComplaints}">0</h2>
                    </div>
                    <i class="fas fa-hourglass-half stat-icon text-warning"></i>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card stat-card border-success border-start border-5 border-top-0 border-bottom-0 border-end-0">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-secondary text-uppercase mb-2">Resolved</h6>
                        <h2 class="mb-0 text-dark" th:text="${resolvedComplaints}">0</h2>
                    </div>
                    <i class="fas fa-check-circle stat-icon text-success"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent Complaints -->
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Recent Activity</h5>
            <a th:href="@{/user/complaints}" class="btn btn-sm btn-outline-primary">View All</a>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="complaint : ${recentComplaints}">
                            <td th:text="${'#' + complaint.id}"></td>
                            <td>
                                <a th:href="@{'/user/complaints/' + ${complaint.id}}" class="text-decoration-none fw-500" th:text="${complaint.title}"></a>
                            </td>
                            <td th:text="${complaint.category.name}"></td>
                            <td th:text="${#temporals.format(complaint.createdAt, 'dd MMM yyyy')}"></td>
                            <td>
                                <span th:class="'badge badge-' + ${complaint.status}" th:text="${complaint.status}"></span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(recentComplaints)}">
                            <td colspan="5" class="text-center py-4 text-muted">No complaints filed yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
