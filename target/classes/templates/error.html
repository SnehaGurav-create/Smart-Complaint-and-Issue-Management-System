<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - SCIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
<div class="container error-container text-center">
    <div>
        <i th:if="${errorCode == '404'}" class="fas fa-search fa-5x text-secondary mb-4"></i>
        <i th:if="${errorCode == '403'}" class="fas fa-lock fa-5x text-warning mb-4"></i>
        <i th:if="${errorCode == '500'}" class="fas fa-exclamation-triangle fa-5x text-danger mb-4"></i>
        <i th:if="${errorCode == null}" class="fas fa-bug fa-5x text-secondary mb-4"></i>
        
        <h1 class="display-1 fw-bold text-primary" th:text="${errorCode != null ? errorCode : 'Error'}"></h1>
        <h3 class="mb-4 text-muted" th:text="${errorMessage != null ? errorMessage : 'Something went wrong.'}"></h3>
        
        <a href="/" class="btn btn-primary btn-lg"><i class="fas fa-home me-2"></i>Return Home</a>
    </div>
</div>
</body>
</html>
