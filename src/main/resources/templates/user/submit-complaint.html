<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="CONTENT_TITLE='Submit Complaint'">
<body>
<div layout:fragment="content">
    <div class="mb-4">
        <h2>File a New Complaint</h2>
        <p class="text-muted">Report an issue in your area.</p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{/user/complaints}" th:object="${complaintDTO}" method="post">
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Complaint Title</label>
                    <input type="text" th:field="*{title}" class="form-control" placeholder="Brief summary of the issue" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Category</label>
                    <select th:field="*{categoryId}" class="form-select" th:classappend="${#fields.hasErrors('categoryId')} ? 'is-invalid'">
                        <option value="">-- Select Category --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="5" placeholder="Provide detailed information about the issue (location specifics, etc.)" th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>
                
                <div class="d-flex justify-content-end">
                    <a th:href="@{/user/dashboard}" class="btn btn-light me-2">Cancel</a>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane me-1"></i> Submit Complaint</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
