<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="CONTENT_TITLE=${complaint.title}">
<body>
<div layout:fragment="content">
    
    <div class="mb-4 d-flex justify-content-between align-items-center">
        <div>
            <a th:href="@{/user/complaints}" class="btn btn-sm btn-outline-secondary mb-3"><i class="fas fa-arrow-left"></i> Back</a>
            <h2>Complaint Details</h2>
        </div>
        <div>
            <span class="fs-5">Status: </span>
            <span th:id="'status-badge-' + ${complaint.id}" class="fs-5 badge" th:classappend="'badge-' + ${complaint.status}" th:text="${complaint.status}"></span>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-header bg-white py-3">
            <h4 class="mb-0" th:text="${complaint.title}"></h4>
        </div>
        <div class="card-body p-4">
            <div class="row mb-4">
                <div class="col-md-4">
                    <p class="text-muted mb-1">Complaint ID</p>
                    <h6 th:text="${'#' + complaint.id}"></h6>
                </div>
                <div class="col-md-4">
                    <p class="text-muted mb-1">Category</p>
                    <h6 th:text="${complaint.category.name}"></h6>
                </div>
                <div class="col-md-4">
                    <p class="text-muted mb-1">Submitted On</p>
                    <h6 th:text="${#temporals.format(complaint.createdAt, 'dd MMM yyyy, HH:mm')}"></h6>
                </div>
            </div>
            
            <hr>
            
            <div class="mt-4">
                <h5 class="mb-3">Description</h5>
                <p class="bg-light p-4 rounded" style="white-space: pre-wrap;" th:text="${complaint.description}"></p>
            </div>
        </div>
    </div>
    
    <div class="card shadow-sm border-0" th:if="${complaint.assignment != null}">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0"><i class="fas fa-hard-hat text-warning me-2"></i> Assignment Info</h5>
        </div>
        <div class="card-body">
            <p class="mb-1">This complaint has been assigned to a city staff member and is currently being monitored.</p>
            <p class="text-muted small mb-0">Assigned on: <span th:text="${#temporals.format(complaint.assignment.assignedAt, 'dd MMM yyyy')}"></span></p>
        </div>
    </div>
</div>
</body>
</html>
