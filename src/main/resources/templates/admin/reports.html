<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="CONTENT_TITLE='System Reports'">
<body>
<div layout:fragment="content">
    <div class="mb-4">
        <h2>System Reports</h2>
        <p class="text-muted">Generated via JDBC Analytics query.</p>
    </div>

    <!-- Date Filter Form -->
    <div class="card shadow-sm border-0 mb-4 bg-light">
        <div class="card-body">
            <form th:action="@{/admin/reports}" method="get" class="row g-3 align-items-center">
                <div class="col-auto">
                    <label class="col-form-label">From Date:</label>
                </div>
                <div class="col-auto">
                    <input type="date" name="fromDate" class="form-control" th:value="${from}">
                </div>
                <div class="col-auto">
                    <label class="col-form-label">To Date:</label>
                </div>
                <div class="col-auto">
                    <input type="date" name="toDate" class="form-control" th:value="${to}">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Generate Report</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Report Results via JDBC -->
    <div class="card shadow-sm border-0 table-custom">
        <div class="card-header bg-white py-3">
             <h5 class="mb-0">Complaint Summary (<span th:text="${from}"></span> to <span th:text="${to}"></span>)</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Category</th>
                            <th>Status</th>
                            <th>Count</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="row : ${reportData}">
                            <td class="ps-4 fw-500" th:text="${row.categoryName}"></td>
                            <td>
                                <span th:class="'badge badge-' + ${row.status}" th:text="${row.status}"></span>
                            </td>
                            <td>
                                <span class="badge bg-secondary rounded-pill" th:text="${row.count}"></span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(reportData)}">
                            <td colspan="3" class="text-center py-4 text-muted">No data found for this period.</td>
                        </tr>
                    </tbody>
                    <!-- Simplified bar chart logic via ChartJS could hook into these rows if needed -->
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
