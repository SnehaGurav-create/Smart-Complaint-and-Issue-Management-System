<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${CONTENT_TITLE} + ' - SCIMS'">Smart Complaint System</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar d-none d-md-block position-relative">
            <h4 class="text-center mb-4"><i class="fas fa-city text-warning"></i> SCIMS</h4>
            
            <div class="mb-4">
                <a th:href="@{/}" class="text-info"><i class="fas fa-home me-2"></i> Portal Home</a>
            </div>
            
            <div sec:authorize="hasAuthority('USER')">
                <a th:href="@{/user/dashboard}"><i class="fas fa-home me-2"></i> Dashboard</a>
                <a th:href="@{/user/complaints}"><i class="fas fa-list me-2"></i> My Complaints</a>
                <a th:href="@{/user/complaints/new}"><i class="fas fa-plus-circle me-2"></i> File Complaint</a>
            </div>
            
            <div sec:authorize="hasAuthority('ADMIN')">
                <a th:href="@{/admin/dashboard}"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
                <a th:href="@{/admin/complaints}"><i class="fas fa-tasks me-2"></i> All Complaints</a>
            </div>
            
            
            <div class="mt-5 w-100 position-absolute bottom-0 mb-4 px-3" style="left:0;">
                <div class="text-light mb-2 small"><i class="fas fa-user-circle"></i> <span sec:authentication="name">User</span></div>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm w-100"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 main-content">
            <!-- Mobile Topbar -->
            <nav class="navbar navbar-dark bg-dark d-md-none mb-4">
                <div class="container-fluid">
                    <span class="navbar-brand mb-0 h1">SCIMS</span>
                    <div class="d-flex">
                        <a th:href="@{/}" class="btn btn-outline-info btn-sm me-2"><i class="fas fa-home"></i></a>
                        <form th:action="@{/logout}" method="post">
                            <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
                        </form>
                    </div>
                </div>
            </nav>

            <div layout:fragment="content">
                <!-- Page Content goes here -->
            </div>
        </div>
    </div>
</div>

<!-- Global WebSocket Toast Notification -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1055">
  <div id="baseNotificationToast" class="toast align-items-center text-white bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body">
        <i class="fas fa-bell me-2"></i> <span id="toastMessage">New notification</span>
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- SockJS & STOMP for WebSockets -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<!-- Global init script -->
<script th:src="@{/js/websocket.js}"></script>

<!-- Theme Handler Removed -->

<th:block layout:fragment="scripts"></th:block>

</body>
</html>
